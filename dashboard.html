<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codzilla Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #121921;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent: #d946ef; /* نفس لون الـ Glow اللي كان في اللمبة */
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 250px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent);
            margin-bottom: 3rem;
            text-align: center;
        }

        .nav-links {
            list-style: none;
            padding: 0;
        }

        .nav-links li {
            margin-bottom: 1rem;
        }

        .nav-links a {
            color: #aaa;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem;
            border-radius: 10px;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            background: var(--card-bg);
            color: white;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            padding: 3rem;
            opacity: 0; /* للأنيميشن عند الدخول */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            position: relative;
            transition: 0.4s;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(217, 70, 239, 0.1);
        }

        .card i {
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .card h3 { margin: 0; color: #888; font-size: 0.9rem; }
        .card .number { font-size: 2.5rem; font-weight: bold; margin: 0.5rem 0; }

        /* Chart Placeholder Animation */
        .chart-box {
            height: 150px;
            background: linear-gradient(90deg, transparent, rgba(217, 70, 239, 0.05), transparent);
            background-size: 200% 100%;
            animation: loading 2s infinite;
            border-radius: 10px;
            margin-top: 1rem;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">CODZILLA 💡</div>
        <ul class="nav-links">
            <li><a href="#" class="active"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="projects.html"><i class="fas fa-project-diagram"></i> Projects</a></li>
            <a href="courses.html">
    <i class="fas fa-graduation-cap"></i> Courses
<li>
    <a href="settings.html">
        <i class="fas fa-cog"></i> Settings
    </a>
</li>
    </aside>

    <main class="main-content" id="mainContent">
        <header>
            <h1>System Status</h1>
            <div style="display:flex; align-items:center; gap:10px;">
                <span>Active Mode</span>
                <div style="width:12px; height:12px; background: #10b981; border-radius:50%; box-shadow:0 0 10px #10b981;"></div>
            </div>
        </header>

        <div class="stats-grid">
            <div class="card">
                <i class="fas fa-users"></i>
                <h3>Total Users</h3>
                <div class="number">1,284</div>
                <div class="chart-box"></div>
            </div>
            <div class="card">
                <i class="fas fa-microchip"></i>
                <h3>CPU Usage</h3>
                <div class="number">24%</div>
                <div class="chart-box"></div>
            </div>
            <div class="card">
                <i class="fas fa-database"></i>
                <h3>Memory</h3>
                <div class="number">5.2GB</div>
                <div class="chart-box"></div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.co/gsap@3/dist/gsap.min.js"></script>
    <script>
        // أنيميشن دخول الصفحة
        window.onload = () => {
            gsap.to("#mainContent", {
                opacity: 1,
                duration: 1,
                ease: "power2.out"
            });

            gsap.from(".card", {
                y: 50,
                opacity: 0,
                duration: 0.8,
                stagger: 0.2,
                ease: "back.out(1.7)"
            });
        };
    </script>
</body>
</html>
